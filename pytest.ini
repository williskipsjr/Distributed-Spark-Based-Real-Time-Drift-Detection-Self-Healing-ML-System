[pytest]
# Pytest configuration for self-healing ML system tests

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Markers
markers =
    unit: Unit tests (component-level)
    integration: Integration tests (multi-component)
    requires_kafka: Requires Kafka broker running
    requires_spark: Requires Spark cluster running
    slow: Slow tests (>5 seconds)

# Test paths
testpaths = tests

# Minimum coverage (optional)
# --cov=src --cov-report=html --cov-fail-under=80

# Timeout for tests (prevent hanging)
timeout = 300

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info .pytest_cache
